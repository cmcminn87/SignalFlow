*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;overflow:hidden;height:100vh}
.home{min-height:100vh;overflow-y:auto;padding:24px}
.home-inner{max-width:960px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px}
.card{background:#16213e;border:1px solid #335;border-radius:10px;padding:14px;cursor:pointer;transition:border .15s;position:relative}
.card:hover{border-color:#7aafff}
.blank-card{border:2px dashed #445;display:flex;align-items:center;justify-content:center;min-height:80px;text-align:center}
.blank-card:hover{border-color:#7aafff}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#1e2a3a;border-radius:12px;padding:20px;min-width:300px;max-width:420px;color:#eee;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal h3{margin:0 0 12px;font-size:15px}
.modal label{font-size:11px;color:#aaa}
.minput{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #445;background:#16213e;color:#eee;font-size:13px;box-sizing:border-box;margin-top:3px;margin-bottom:10px}
.color-row{display:flex;gap:5px;margin:5px 0 14px;flex-wrap:wrap}
.cswatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent}
.cswatch.sel{border-color:#fff}
.type-row{display:flex;gap:4px;margin:5px 0 14px;flex-wrap:wrap}
.tbtn{padding:2px 9px;border-radius:5px;font-size:11px;cursor:pointer}
.mactions{display:flex;gap:8px;justify-content:flex-end}
.btn-p{background:#4a6fa5;color:#fff;border:none;border-radius:6px;padding:7px 18px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-c{background:transparent;color:#aaa;border:1px solid #445;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px}
</style>

// ========== EDGE CALC ==========
function getEP(ns,fid,tid){
  var f=null,t=null;
  for(var i=0;i<ns.length;i++){if(ns[i].id===fid)f=ns[i];if(ns[i].id===tid)t=ns[i]}
  if(!f||!t)return{fx:0,fy:0,tx:0,ty:0};
  var fcx=f.x+f.w/2,fcy=f.y+f.h/2,tcx=t.x+t.w/2,tcy=t.y+t.h/2;
  var ang=Math.atan2(tcy-fcy,tcx-fcx);
  function ex(n,cx,cy,a){var hw=n.w/2,hh=n.h/2,ta=Math.atan2(hh,hw),aa=Math.abs(a);if(aa<ta||aa>Math.PI-ta){var s=Math.sign(Math.cos(a));return{x:cx+s*hw,y:cy+s*hw*Math.tan(a)}}var s2=Math.sign(Math.sin(a));return{x:cx+s2*hh/Math.tan(a),y:cy+s2*hh}}
  var fp=ex(f,fcx,fcy,ang),tp=ex(t,tcx,tcy,ang+Math.PI);
  return{fx:fp.x,fy:fp.y,tx:tp.x,ty:tp.y};
}

// ========== EXPORT ==========
function buildSVG(){
  var ns=S.nodes,cs=S.conns;
  var mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  for(var i=0;i<ns.length;i++){var n=ns[i];mnX=Math.min(mnX,n.x);mnY=Math.min(mnY,n.y);mxX=Math.max(mxX,n.x+n.w);mxY=Math.max(mxY,n.y+n.h)}
  if(!ns.length){mnX=0;mnY=0;mxX=800;mxY=600}
  var p=60;mnX-=p;mnY-=p;mxX+=p;mxY+=p;var cw=mxX-mnX,ch=mxY-mnY;
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+cw+'" height="'+ch+'" viewBox="'+mnX+" "+mnY+" "+cw+" "+ch+'">';
  s+='<rect x="'+mnX+'" y="'+mnY+'" width="'+cw+'" height="'+ch+'" fill="#1a1a2e"/>';
  s+='<text x="'+(mnX+cw/2)+'" y="'+(mnY+28)+'" text-anchor="middle" fill="#eee" font-size="18" font-weight="bold" font-family="Arial">'+esc(S.curName)+'</text>';
  var ccKeys=Object.keys(CC);
  for(var ci=0;ci<ccKeys.length;ci++){var k=ccKeys[ci],v=CC[k],lx=mnX+20,ly=mnY+50+ci*18;s+='<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx+16)+'" y2="'+ly+'" stroke="'+v+'" stroke-width="2.5"/><text x="'+(lx+22)+'" y="'+(ly+4)+'" fill="#aaa" font-size="10" font-family="Arial">'+k+'</text>'}
  for(var ci2=0;ci2<cs.length;ci2++){var c=cs[ci2];var cf=null,ct=null;for(var j=0;j<ns.length;j++){if(ns[j].id===c.from)cf=ns[j];if(ns[j].id===c.to)ct=ns[j]}if(!cf||!ct)continue;var ep=getEP(ns,c.from,c.to);var mx=(ep.fx+ep.tx)/2,my=(ep.fy+ep.ty)/2,col=CC[c.type]||CC.Other;s+='<line x1="'+ep.fx+'" y1="'+ep.fy+'" x2="'+ep.tx+'" y2="'+ep.ty+'" stroke="'+col+'" stroke-width="2" opacity="0.7"/><circle cx="'+ep.tx+'" cy="'+ep.ty+'" r="3" fill="'+col+'"/>';if(c.label){var bw=c.label.length*6.4+12;s+='<rect x="'+(mx-bw/2)+'" y="'+(my-9)+'" width="'+bw+'" height="18" rx="3" fill="#1a1a2e" opacity="0.85"/><text x="'+mx+'" y="'+(my+4)+'" text-anchor="middle" fill="#aaa" font-size="9" font-family="monospace">'+esc(c.label)+'</text>'}}
  for(var ni=0;ni<ns.length;ni++){var nd=ns[ni];s+='<rect x="'+nd.x+'" y="'+nd.y+'" width="'+nd.w+'" height="'+nd.h+'" rx="6" fill="'+nd.color+'" stroke="rgba(255,255,255,0.15)"/>';var lines=nd.label.split("\n");for(var li=0;li<lines.length;li++){var ty=nd.y+nd.h/2+(li-(lines.length-1)/2)*14;s+='<text x="'+(nd.x+nd.w/2)+'" y="'+ty+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="bold" font-family="Arial">'+esc(lines[li])+'</text>'}}
  return s+'</svg>';
}
function dlFile(content,name,type){var b=new Blob([content],{type:type});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}

// ========== GLOBAL FUNCTIONS ==========
window.exportSVG=function(){dlFile(buildSVG(),S.curName.replace(/[^a-zA-Z0-9]/g,"_")+".svg","image/svg+xml")};
window.exportJSON=function(){dlFile(JSON.stringify({name:S.curName,nodes:S.nodes,conns:S.conns,exportedAt:new Date().toISOString()},null,2),S.curName.replace(/[^a-zA-Z0-9]/g,"_")+".json","application/json")};
window.doImportJSON=function(el){if(!el.files||!el.files[0])return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.nodes&&d.conns){S.nodes=d.nodes;S.conns=d.conns;S.curName=d.name||"Imported";S.screen="editor";S.zoom=0.85;S.panX=0;S.panY=0;S.mode="move";S.sel=null;S.connSt=null;render()}}catch(err){alert("Invalid JSON file")}};r.readAsText(el.files[0]);el.value=""};

window.openTemplate=function(i){var t=i===-1?{name:"Blank Canvas",nodes:[],conns:[]}:TEMPLATES[i];S.nodes=clone(t.nodes);S.conns=clone(t.conns);S.curName=t.name;S.screen="editor";S.zoom=0.85;S.panX=0;S.panY=0;S.mode="move";S.sel=null;S.connSt=null;S.gearOpen=false;render()};
window.openSaved=function(i){var s=S.saved[i];S.nodes=clone(s.nodes);S.conns=clone(s.conns);S.curName=s.name;S.screen="editor";S.zoom=0.85;S.panX=0;S.panY=0;S.mode="move";S.sel=null;S.connSt=null;S.gearOpen=false;render()};
window.delSaved=function(i){if(event)event.stopPropagation();S.saved.splice(i,1);persist();render()};
window.goHome=function(){S.screen="home";S.modal=null;render()};
window.setMode=function(m){S.mode=m;S.connSt=null;render()};
window.toggleGear=function(){S.gearOpen=!S.gearOpen;render()};
window.setGearCat=function(c){S.gearCat=c;renderGear()};
window.setGearFilter=function(v){S.gearFilter=v;renderGear()};
window.showSave=function(){S.fd={name:S.curName};S.modal="save";renderModal()};
window.startEdit=function(id){var n=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===id){n=S.nodes[i];break}}if(!n)return;S.fd={id:id,label:n.label.replace(/\n/g,"\\n"),color:n.color};S.modal="edit";renderModal()};

window.addGear=function(catIdx,itemIdx){
  var g=GEAR[catIdx];var it=g.items[itemIdx];
  var label=(it.id&&it.id!=="")?it.label+"\n"+it.id:it.label;
  var color=CAT_COLORS[g.cat]||"#555";
  var lines=label.split("\n");var ml=0;for(var i=0;i<lines.length;i++){if(lines[i].length>ml)ml=lines[i].length}
  var cx=(-S.panX+400)/S.zoom,cy=(-S.panY+300)/S.zoom;
  S.nodes.push({id:uid(),label:label,x:cx-60,y:cy-20,w:Math.max(120,ml*9+20),h:Math.max(40,lines.length*18+16),color:color});
  renderSVGOnly();
};

// ========== MODAL ACTIONS ==========
window.doAddNode=function(){
  var inp=document.getElementById("m-label");
  if(!inp)return;
  var v=inp.value;if(!v||!v.trim())return;
  var l=v.replace(/\\n/g,"\n");var lines=l.split("\n");var ml=0;for(var i=0;i<lines.length;i++){if(lines[i].length>ml)ml=lines[i].length}
  S.nodes.push({id:uid(),label:l,x:(S.fd.x||400)-60,y:(S.fd.y||300)-20,w:Math.max(120,ml*9+20),h:Math.max(40,lines.length*18+16),color:S.fd.color||COLORS[0]});
  S.modal=null;closeModal();renderSVGOnly();
};

window.doAddConn=function(){
  var inp=document.getElementById("m-clabel");
  var label=inp?inp.value:"";
  S.conns.push({id:cuid(),from:S.fd.from,to:S.fd.to,label:label,type:S.fd.type||"SDI"});
  S.modal=null;closeModal();renderSVGOnly();
};

window.doSaveEdit=function(){
  var inp=document.getElementById("m-elabel");
  if(!inp)return;
  var v=inp.value||"";
  var l=v.replace(/\\n/g,"\n");var lines=l.split("\n");var ml=0;for(var i=0;i<lines.length;i++){if(lines[i].length>ml)ml=lines[i].length}
  for(var i=0;i<S.nodes.length;i++){
    if(S.nodes[i].id===S.fd.id){
      S.nodes[i].label=l;
      S.nodes[i].w=Math.max(120,ml*9+20);
      S.nodes[i].h=Math.max(40,lines.length*18+16);
      if(S.fd.color)S.nodes[i].color=S.fd.color;
      break;
    }
  }
  S.modal=null;closeModal();renderSVGOnly();
};

window.doSave=function(){
  var inp=document.getElementById("m-sname");
  if(!inp)return;
  var v=inp.value;if(!v||!v.trim())return;
  S.saved.push({name:v.trim(),nodes:clone(S.nodes),conns:clone(S.conns),ts:Date.now()});
  S.curName=v.trim();persist();
  S.modal=null;closeModal();render();
};

window.setFDColor=function(c){S.fd.color=c;renderModal()};
window.setFDType=function(t){
  var inp=document.getElementById("m-clabel");
  if(inp)S.fd.label=inp.value;
  S.fd.type=t;renderModal();
};
window.setEditColor=function(c){
  S.fd.color=c;
  for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.fd.id){S.nodes[i].color=c;break}}
  renderModal();renderSVGOnly();
};

}

function renderGear(){
  var list=document.getElementById("gearlist");if(!list)return;
  var q=S.gearFilter.toLowerCase();
  var h="";var found=false;
  for(var gi=0;gi<GEAR.length;gi++){
    var g=GEAR[gi];
    if(S.gearCat!=="All"&&g.cat!==S.gearCat)continue;
    var fitems=[];
    for(var ii=0;ii<g.items.length;ii++){
      var it=g.items[ii];
      if(!q||it.model.toLowerCase().indexOf(q)>=0||it.label.toLowerCase().indexOf(q)>=0||(it.id||"").toLowerCase().indexOf(q)>=0){fitems.push({item:it,idx:ii})}
    }
    if(fitems.length===0)continue;
    found=true;
    h+='<div style="font-size:10px;color:#888;font-weight:bold;margin:8px 0 4px;text-transform:uppercase">'+esc(g.cat)+(g.sub?" &mdash; "+esc(g.sub):"")+'</div>';
    for(var fi=0;fi<fitems.length;fi++){
      var fit=fitems[fi];
      h+='<div onclick="addGear('+gi+','+fit.idx+')" style="padding:6px 8px;background:#1a2235;border-radius:6px;margin-bottom:3px;cursor:pointer;border-left:3px solid '+(CAT_COLORS[g.cat]||"#555")+'" onmouseover="this.style.background=\'#253554\'" onmouseout="this.style.background=\'#1a2235\'">';
      h+='<div style="font-size:12px;font-weight:bold;color:#ddd">'+esc(fit.item.model)+'</div>';
      h+='<div style="font-size:10px;color:#777;display:flex;justify-content:space-between"><span>'+esc(fit.item.id||"")+'</span><span>&times;'+fit.item.qty+'</span></div></div>';
    }
  }
  if(!found)h='<div style="color:#556;font-size:12px;margin-top:20px;text-align:center">No gear matches</div>';
  list.innerHTML=h;
}

function renderSVGOnly(){
  var svg=document.getElementById("svg");if(!svg)return;
  var ns=S.nodes,cs=S.conns;
  var s='<rect data-bg="1" width="100%" height="100%" fill="#1a1a2e"/>';
  s+='<g transform="translate('+S.panX+','+S.panY+') scale('+S.zoom+')">';
  // Connections
  for(var ci=0;ci<cs.length;ci++){
    var c=cs[ci];var cf=null,ct=null;
    for(var j=0;j<ns.length;j++){if(ns[j].id===c.from)cf=ns[j];if(ns[j].id===c.to)ct=ns[j]}
    if(!cf||!ct)continue;
    var ep=getEP(ns,c.from,c.to);var mx=(ep.fx+ep.tx)/2,my=(ep.fy+ep.ty)/2;
    var col=CC[c.type]||CC.Other;
    s+='<line x1="'+ep.fx+'" y1="'+ep.fy+'" x2="'+ep.tx+'" y2="'+ep.ty+'" stroke="'+col+'" stroke-width="2" opacity="0.7"/>';
    s+='<circle cx="'+ep.tx+'" cy="'+ep.ty+'" r="3" fill="'+col+'"/>';
    if(c.label){
      var bw=c.label.length*6.4+12;
      s+='<g transform="translate('+mx+','+my+')" data-conn="'+c.id+'" style="cursor:'+(S.mode==="delete"?"pointer":"default")+'">';
      s+='<rect x="'+(-bw/2)+'" y="-9" width="'+bw+'" height="18" rx="3" fill="'+(S.mode==="delete"?"#3a1515":"#1a1a2e")+'" opacity="0.9" stroke="'+(S.mode==="delete"?"#a33":"transparent")+'"/>';
      s+='<text text-anchor="middle" dy="4" fill="'+(S.mode==="delete"?"#f88":"#aaa")+'" font-size="9" font-family="monospace" pointer-events="none">'+esc(c.label)+'</text></g>';
    }
  }
  // Drag line
  if(S.mode==="addConn"&&S.connSt){
    var csn=null;for(var j=0;j<ns.length;j++){if(ns[j].id===S.connSt){csn=ns[j];break}}
    if(csn)s+='<line x1="'+(csn.x+csn.w/2)+'" y1="'+(csn.y+csn.h/2)+'" x2="'+S.mX+'" y2="'+S.mY+'" stroke="#7aafff" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" pointer-events="none"/>';
  }
  // Nodes
  for(var ni=0;ni<ns.length;ni++){
    var n=ns[ni];
    var isSel=S.sel===n.id,isCS=S.connSt===n.id,isDel=S.mode==="delete";
    var stroke=isSel?"#fff":isCS?"#7aafff":isDel?"#f44":"rgba(255,255,255,0.15)";
    var sw=isSel||isCS?2.5:isDel?2:1;
    var cursor=isDel?"pointer":S.mode==="addConn"?"pointer":"move";
    s+='<g data-node="'+n.id+'" transform="translate('+n.x+','+n.y+')" style="cursor:'+cursor+'">';
    s+='<rect width="'+n.w+'" height="'+n.h+'" rx="6" fill="'+n.color+'" stroke="'+stroke+'" stroke-width="'+sw+'"'+(isSel?' filter="url(#glow)"':"")+'/>';
    var lines=n.label.split("\n");
    for(var li=0;li<lines.length;li++){
      var ty=n.h/2+(li-(lines.length-1)/2)*14;
      s+='<text x="'+(n.w/2)+'" y="'+ty+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="bold" font-family="Arial" pointer-events="none">'+esc(lines[li])+'</text>';
    }
    s+='</g>';
  }
  s+='<defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  s+='</g>';
  // Legend — only show types actually used
  var usedTypes={};
  for(var ui=0;ui<cs.length;ui++){usedTypes[cs[ui].type]=true}
  var ccKeys=Object.keys(CC);
  var legendIdx=0;
  s+='<g transform="translate(16,12)">';
  for(var ci=0;ci<ccKeys.length;ci++){
    var k=ccKeys[ci],v=CC[k];
    if(!usedTypes[k])continue;
    s+='<g transform="translate(0,'+(legendIdx*16)+')"><line x1="0" y1="0" x2="16" y2="0" stroke="'+v+'" stroke-width="2.5"/><text x="20" y="4" fill="#aaa" font-size="9">'+k+'</text></g>';
    legendIdx++;
  }
  s+='</g>';
  svg.innerHTML=s;
}

function svgPt(cx,cy){
  var svg=document.getElementById("svg");
  if(!svg)return{x:cx,y:cy};
  var r=svg.getBoundingClientRect();
  return{x:(cx-r.left-S.panX)/S.zoom,y:(cy-r.top-S.panY)/S.zoom};
}

function attachEvents(){
  var svg=document.getElementById("svg");if(!svg)return;
  svg.onpointerdown=function(e){
    var nodeEl=e.target.closest?e.target.closest("[data-node]"):null;
    var connEl=e.target.closest?e.target.closest("[data-conn]"):null;

    if(connEl&&S.mode==="delete"){
      e.stopPropagation();
      var cid=connEl.getAttribute("data-conn");
      S.conns=S.conns.filter(function(c){return c.id!==cid});
      renderSVGOnly();return;
    }
    if(nodeEl){
      e.stopPropagation();
      var id=nodeEl.getAttribute("data-node");
      if(S.mode==="delete"){
        S.nodes=S.nodes.filter(function(n){return n.id!==id});
        S.conns=S.conns.filter(function(c){return c.from!==id&&c.to!==id});
        S.sel=null;renderSVGOnly();return;
      }
      if(S.mode==="addConn"){
        if(!S.connSt){S.connSt=id;renderSVGOnly()}
        else if(S.connSt!==id){
          S.fd={from:S.connSt,to:id,label:"",type:"SDI"};
          S.connSt=null;S.modal="conn";renderModal();
        }
        return;
      }
      var pt=svgPt(e.clientX,e.clientY);
      var n=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===id){n=S.nodes[i];break}}
      if(!n)return;
      S.drag=id;S.sel=id;S.offX=pt.x-n.x;S.offY=pt.y-n.y;
      renderSVGOnly();return;
    }
    if(e.target===svg||e.target.getAttribute("data-bg")){
      S.sel=null;
      if(S.mode==="addNode"){
        var pt2=svgPt(e.clientX,e.clientY);
        S.fd={x:pt2.x,y:pt2.y,label:"",color:COLORS[0]};
        S.modal="addNode";renderModal();return;
      }
      if(S.mode==="addConn"){S.connSt=null;renderSVGOnly();return}
      S.panning=true;S.psX=e.clientX-S.panX;S.psY=e.clientY-S.panY;
    }
  };
  svg.onpointermove=function(e){
    var pt=svgPt(e.clientX,e.clientY);S.mX=pt.x;S.mY=pt.y;
    if(S.panning){S.panX=e.clientX-S.psX;S.panY=e.clientY-S.psY;renderSVGOnly();return}
    if(S.drag){
      var n=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.drag){n=S.nodes[i];break}}
      if(n){n.x=pt.x-S.offX;n.y=pt.y-S.offY;renderSVGOnly()}
      return;
    }
    if(S.mode==="addConn"&&S.connSt)renderSVGOnly();
  };
  svg.onpointerup=function(){S.drag=null;S.panning=false};
  svg.ondblclick=function(e){
    var ne=e.target.closest?e.target.closest("[data-node]"):null;
    if(ne&&S.mode==="move")startEdit(ne.getAttribute("data-node"));
  };
  svg.addEventListener("wheel",function(e){
    e.preventDefault();
    S.zoom=Math.min(2,Math.max(0.3,S.zoom-e.deltaY*0.001));
    renderSVGOnly();
  },{passive:false});
}

// ========== MODALS ==========
function closeModal(){
  var old=document.getElementById("modal-ov");
  if(old)old.parentNode.removeChild(old);
}

function renderModal(){
  closeModal();
  if(!S.modal)return;
  var div=document.createElement("div");
  div.id="modal-ov";div.className="overlay";
  div.onclick=function(e){if(e.target===div){S.modal=null;closeModal()}};

  var h='<div class="modal" onclick="event.stopPropagation()">';

  if(S.modal==="addNode"){
    h+='<h3>Add Custom Node</h3>';
    h+='<label>Label (use \\n for line breaks)</label>';
    h+='<input id="m-label" class="minput" value="'+esc(S.fd.label||"")+'" placeholder="e.g. NEW CAMERA">';
    h+='<label>Color</label><div class="color-row">';
    for(var i=0;i<COLORS.length;i++){h+='<div class="cswatch'+(S.fd.color===COLORS[i]?" sel":"")+'" style="background:'+COLORS[i]+'" onclick="setFDColor(\''+COLORS[i]+'\')"></div>'}
    h+='</div><div class="mactions"><button class="btn-c" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doAddNode()">Add</button></div>';

  }else if(S.modal==="conn"){
    var fn=null,tn=null;
    for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.fd.from)fn=S.nodes[i];if(S.nodes[i].id===S.fd.to)tn=S.nodes[i]}
    h+='<h3>New Connection</h3>';
    h+='<p style="font-size:11px;color:#aaa;margin-bottom:8px">'+(fn?esc(fn.label.replace(/\n/g," ")):"")+' &rarr; '+(tn?esc(tn.label.replace(/\n/g," ")):"")+' </p>';
    h+='<label>Label</label>';
    h+='<input id="m-clabel" class="minput" value="'+esc(S.fd.label||"")+'" placeholder="e.g. SDI OUT 5">';
    h+='<label>Type</label><div class="type-row">';
    var ccKeys=Object.keys(CC);
    for(var i=0;i<ccKeys.length;i++){var k=ccKeys[i],v=CC[k];var isSel=S.fd.type===k;h+='<button class="tbtn" style="background:'+(isSel?v:"transparent")+';color:'+(isSel?"#fff":v)+';border:1.5px solid '+v+';font-weight:'+(isSel?"bold":"normal")+'" onclick="setFDType(\''+k+'\')">'+k+'</button>'}
    h+='</div><div class="mactions"><button class="btn-c" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doAddConn()">Add</button></div>';

  }else if(S.modal==="edit"){
    h+='<h3>Edit Node</h3>';
    h+='<label>Label (use \\n for line breaks)</label>';
    h+='<input id="m-elabel" class="minput" value="'+esc(S.fd.label||"")+'">';
    h+='<label>Color</label><div class="color-row">';
    for(var i=0;i<COLORS.length;i++){h+='<div class="cswatch'+(S.fd.color===COLORS[i]?" sel":"")+'" style="background:'+COLORS[i]+'" onclick="setEditColor(\''+COLORS[i]+'\')"></div>'}
    h+='</div><div class="mactions"><button class="btn-c" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doSaveEdit()">Save</button></div>';

  }else if(S.modal==="save"){
    h+='<h3>Save Flow</h3>';
    h+='<label>Name</label>';
    h+='<input id="m-sname" class="minput" value="'+esc(S.fd.name||"")+'">';
    h+='<div class="mactions"><button class="btn-c" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doSave()">Save</button></div>';
  }

  h+='</div>';
  div.innerHTML=h;
  document.body.appendChild(div);

  // Focus input and attach enter key
  setTimeout(function(){
    var inp=div.querySelector("input");
    if(inp){
      inp.focus();
      inp.setSelectionRange(inp.value.length,inp.value.length);
      inp.onkeydown=function(e){
        if(e.key==="Enter"){
          e.preventDefault();
          if(S.modal==="addNode")doAddNode();
          else if(S.modal==="conn")doAddConn();
          else if(S.modal==="edit")doSaveEdit();
          else if(S.modal==="save")doSave();
        }
      };
    }
  },60);
}

// Boot
render();
</script>
</body>
</html>
