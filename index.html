<title>Signal Flow Editor — Accenture Chicago</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f1219;color:#e0e4ec;overflow:hidden;height:100vh}
::selection{background:#4a6fa5;color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0d14}
::-webkit-scrollbar-thumb{background:#2a3346;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a4a66}

/* HOME */
.home{min-height:100vh;overflow-y:auto;background:linear-gradient(170deg,#0f1219 0%,#141b2a 50%,#111722 100%)}
.home-inner{max-width:1020px;margin:0 auto;padding:48px 24px 24px}
.home-header{margin-bottom:40px}
.home-header h1{font-size:32px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#e0e4ec,#7aafff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.home-header p{color:#5a6580;font-size:15px;font-weight:400}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1e2738}
.section-title.saved{color:#7aafff}.section-title.tpl{color:#5a6580}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:36px}
.card{background:#161d2b;border:1px solid #1e2738;border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4a6fa5,#7aafff);opacity:0;transition:opacity .2s}
.card:hover{border-color:#2a3d5e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card-title{font-weight:600;font-size:15px;margin-bottom:5px;color:#e0e4ec}
.card-desc{color:#5a6580;font-size:12.5px;line-height:1.5}
.card-meta{color:#3a4660;font-size:11px;margin-top:8px;display:flex;align-items:center;gap:12px}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-del{position:absolute;top:12px;right:12px;background:#1a2235;border:1px solid #2a3346;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#5a6580;cursor:pointer;font-size:14px;transition:all .15s;line-height:1}
.card-del:hover{background:#3a1520;border-color:#6a2535;color:#ff6b7a}
.blank-card{border:2px dashed #1e2738;display:flex;align-items:center;justify-content:center;min-height:100px;text-align:center;background:transparent}
.blank-card:hover{border-color:#4a6fa5;background:rgba(74,111,165,.05)}
.blank-card::before{display:none}
.blank-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#1e2738,#2a3d5e);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px}
.import-btn{background:linear-gradient(135deg,#1e2738,#253350);color:#7aafff;border:1px solid #2a3d5e;border-radius:8px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.import-btn:hover{background:linear-gradient(135deg,#253350,#2a3d5e);border-color:#4a6fa5;transform:translateY(-1px)}

/* EDITOR */
.toolbar{padding:6px 14px;background:#111824;border-bottom:1px solid #1a2030;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn-back{background:#161d2b;border:1px solid #1e2738;color:#5a6580;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-back:hover{border-color:#3a4a66;color:#e0e4ec}
.btn-gear{border:1px solid #1e2738;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:4px}
.btn-mode{border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;border:1px solid #1e2738;background:#161d2b;color:#8090a8}
.btn-mode:hover{border-color:#3a4a66;color:#e0e4ec}
.btn-mode.active{background:linear-gradient(135deg,#2a4a7a,#4a6fa5);border-color:#5a8fd0;color:#fff;box-shadow:0 2px 8px rgba(74,111,165,.3)}
.btn-action{border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;color:#fff}
.btn-action:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.btn-save{background:linear-gradient(135deg,#3a5a8a,#4a6fa5)}
.btn-svg{background:linear-gradient(135deg,#1a6a3a,#2E7D32)}
.btn-json{background:linear-gradient(135deg,#1255a0,#1565C0)}
.flow-name{font-size:13px;font-weight:600;color:#e0e4ec;letter-spacing:-0.3px}
.hint{padding:4px 14px;font-size:10px;font-weight:500;letter-spacing:0.3px;transition:background .2s}
.hint-move{background:#111824;color:#3a4a66}.hint-add{background:#0f1f18;color:#2a6a4a}.hint-conn{background:#0f1520;color:#2a4a7a}.hint-del{background:#1f0f14;color:#6a2a35}

/* GEAR PANEL */
.gear-panel{background:#0c1018;border-right:1px solid #1a2030;flex-shrink:0;display:flex;flex-direction:column;height:100vh;transition:width .25s ease}
.gear-header{padding:14px 14px 12px;border-bottom:1px solid #1a2030;display:flex;justify-content:space-between;align-items:center}
.gear-header span{font-weight:700;font-size:14px;letter-spacing:-0.3px}
.gear-close{background:0;border:0;color:#3a4a66;cursor:pointer;font-size:18px;transition:color .15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.gear-close:hover{color:#e0e4ec;background:#1a2235}
.gear-search{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #1e2738;background:#111824;color:#e0e4ec;font-size:12px;box-sizing:border-box;transition:border-color .15s;outline:none}
.gear-search:focus{border-color:#4a6fa5}
.gear-search::placeholder{color:#3a4660}
.gear-cat-btn{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:0.5px}
.gear-item{padding:8px 10px;background:#111824;border-radius:8px;margin-bottom:4px;cursor:pointer;border-left:3px solid;transition:all .15s}
.gear-item:hover{background:#1a2540;transform:translateX(2px)}
.gear-item-model{font-size:12px;font-weight:600;color:#c0c8d8}
.gear-item-meta{font-size:10px;color:#3a4a66;display:flex;justify-content:space-between;margin-top:2px}
.gear-sub-title{font-size:9px;color:#3a4a66;font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}

/* LEGEND */
.legend-box{position:absolute;bottom:14px;right:14px;background:rgba(14,18,26,.92);border:1px solid #1e2738;border-radius:10px;padding:10px 14px;z-index:10;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.legend-row:last-child{margin-bottom:0}
.legend-line{width:18px;height:0;border:none}
.legend-label{font-size:10px;font-weight:500;color:#5a6580}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:#161d2b;border:1px solid #1e2738;border-radius:16px;padding:24px;min-width:340px;max-width:440px;color:#e0e4ec;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal h3{margin:0 0 18px;font-size:17px;font-weight:700;letter-spacing:-0.3px}
.modal label{font-size:11px;font-weight:600;color:#5a6580;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.minput{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #1e2738;background:#111824;color:#e0e4ec;font-size:14px;box-sizing:border-box;margin-bottom:14px;outline:none;transition:border-color .15s}
.minput:focus{border-color:#4a6fa5}
.minput::placeholder{color:#3a4660}
.color-row{display:flex;gap:6px;margin:6px 0 18px;flex-wrap:wrap}
.cswatch{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2)}
.type-row{display:flex;gap:5px;margin:6px 0 18px;flex-wrap:wrap}
.tbtn{padding:4px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:500;transition:all .15s}
.tbtn:hover{transform:translateY(-1px)}
.mactions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.btn-p{background:linear-gradient(135deg,#3a5a8a,#4a6fa5);color:#fff;border:none;border-radius:10px;padding:10px 24px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,111,165,.4)}
.btn-cc{background:#111824;color:#5a6580;border:1px solid #1e2738;border-radius:10px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
.btn-cc:hover{border-color:#3a4a66;color:#e0e4ec}

/* SEL INFO */
.sel-info{position:absolute;bottom:14px;left:14px;background:rgba(14,18,26,.92);border:1px solid #1e2738;border-radius:10px;padding:8px 14px;z-index:10;display:flex;gap:10px;align-items:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.sel-info-name{font-weight:600;font-size:12px;color:#e0e4ec}
.sel-info-btn{background:#1a2235;border:1px solid #2a3346;border-radius:6px;padding:3px 10px;color:#7aafff;cursor:pointer;font-size:10px;font-weight:600;transition:all .15s}
.sel-info-btn:hover{background:#253350;border-color:#4a6fa5}
</style>

function getEP(ns,fid,tid){var f=null,t=null;for(var i=0;i<ns.length;i++){if(ns[i].id===fid)f=ns[i];if(ns[i].id===tid)t=ns[i]}if(!f||!t)return{fx:0,fy:0,tx:0,ty:0};var fcx=f.x+f.w/2,fcy=f.y+f.h/2,tcx=t.x+t.w/2,tcy=t.y+t.h/2;var ang=Math.atan2(tcy-fcy,tcx-fcx);function ex(n,cx,cy,a){var hw=n.w/2,hh=n.h/2,ta=Math.atan2(hh,hw),aa=Math.abs(a);if(aa<ta||aa>Math.PI-ta){var s=Math.sign(Math.cos(a));return{x:cx+s*hw,y:cy+s*hw*Math.tan(a)}}var s2=Math.sign(Math.sin(a));return{x:cx+s2*hh/Math.tan(a),y:cy+s2*hh}}var fp=ex(f,fcx,fcy,ang),tp=ex(t,tcx,tcy,ang+Math.PI);return{fx:fp.x,fy:fp.y,tx:tp.x,ty:tp.y}}

function buildSVG(){var ns=S.nodes,cs=S.conns;var mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;for(var i=0;i<ns.length;i++){var n=ns[i];mnX=Math.min(mnX,n.x);mnY=Math.min(mnY,n.y);mxX=Math.max(mxX,n.x+n.w);mxY=Math.max(mxY,n.y+n.h)}if(!ns.length){mnX=0;mnY=0;mxX=800;mxY=600}var p=60;mnX-=p;mnY-=p;mxX+=p;mxY+=p;var cw=mxX-mnX,ch=mxY-mnY;var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+cw+'" height="'+ch+'" viewBox="'+mnX+' '+mnY+' '+cw+' '+ch+'"><rect x="'+mnX+'" y="'+mnY+'" width="'+cw+'" height="'+ch+'" fill="#0f1219"/><text x="'+(mnX+cw/2)+'" y="'+(mnY+28)+'" text-anchor="middle" fill="#e0e4ec" font-size="18" font-weight="bold" font-family="Segoe UI,system-ui,sans-serif">'+esc(S.curName)+'</text>';var usedTypes={};for(var ci=0;ci<cs.length;ci++){usedTypes[cs[ci].type]=true}var ccKeys=Object.keys(CC);var li2=0;for(var ci=0;ci<ccKeys.length;ci++){var k=ccKeys[ci],v=CC[k];if(!usedTypes[k])continue;var lx=mnX+20,ly=mnY+50+li2*18;s+='<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx+16)+'" y2="'+ly+'" stroke="'+v+'" stroke-width="2.5"/><text x="'+(lx+22)+'" y="'+(ly+4)+'" fill="#5a6580" font-size="10" font-family="Segoe UI,sans-serif">'+k+'</text>';li2++}for(var ci2=0;ci2<cs.length;ci2++){var c=cs[ci2];var cf=null,ct=null;for(var j=0;j<ns.length;j++){if(ns[j].id===c.from)cf=ns[j];if(ns[j].id===c.to)ct=ns[j]}if(!cf||!ct)continue;var ep=getEP(ns,c.from,c.to);var mx=(ep.fx+ep.tx)/2,my=(ep.fy+ep.ty)/2,col=CC[c.type]||CC.Other;s+='<line x1="'+ep.fx+'" y1="'+ep.fy+'" x2="'+ep.tx+'" y2="'+ep.ty+'" stroke="'+col+'" stroke-width="2" opacity="0.7"/><circle cx="'+ep.tx+'" cy="'+ep.ty+'" r="3" fill="'+col+'"/>';if(c.label){var bw=c.label.length*6.4+12;s+='<rect x="'+(mx-bw/2)+'" y="'+(my-9)+'" width="'+bw+'" height="18" rx="3" fill="#0f1219" opacity="0.85"/><text x="'+mx+'" y="'+(my+4)+'" text-anchor="middle" fill="#5a6580" font-size="9" font-family="monospace">'+esc(c.label)+'</text>'}}for(var ni=0;ni<ns.length;ni++){var nd=ns[ni];s+='<rect x="'+nd.x+'" y="'+nd.y+'" width="'+nd.w+'" height="'+nd.h+'" rx="8" fill="'+nd.color+'" stroke="rgba(255,255,255,0.1)"/>';var lines=nd.label.split("\n");for(var li=0;li<lines.length;li++){var ty=nd.y+nd.h/2+(li-(lines.length-1)/2)*14;s+='<text x="'+(nd.x+nd.w/2)+'" y="'+ty+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="600" font-family="Segoe UI,sans-serif">'+esc(lines[li])+'</text>'}}return s+'</svg>'}
function dlFile(content,name,type){var b=new Blob([content],{type:type});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}

function renderEditor(app){
  var gw=S.gearOpen?280:0;
  var h='<div style="display:flex;height:100vh;width:100%">';
  h+='<div class="gear-panel" style="width:'+gw+'px">';
  if(S.gearOpen){
    h+='<div class="gear-header"><span>Chicago Gear</span><button class="gear-close" onclick="toggleGear()">&times;</button></div>';
    h+='<div style="padding:10px 12px"><input id="gear-search" class="gear-search" value="'+esc(S.gearFilter)+'" oninput="setGearFilter(this.value)" placeholder="Search equipment...">';
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">';
    var cats=["All","Video","Audio","Lighting","Misc"];
    for(var ci=0;ci<cats.length;ci++){var c=cats[ci];var isActive=S.gearCat===c;h+='<button class="gear-cat-btn" onclick="setGearCat(\''+c+'\')" style="background:'+(isActive?(CAT_COLORS[c]||"#4a6fa5"):"transparent")+';color:'+(isActive?"#fff":(CAT_COLORS[c]||"#5a6580"))+';border:1px solid '+(isActive?(CAT_COLORS[c]||"#4a6fa5"):"#1e2738")+'">'+c+'</button>'}
    h+='</div></div><div id="gearlist" style="flex:1;overflow-y:auto;padding:0 12px 12px"></div>';
  }
  h+='</div>';
  h+='<div style="flex:1;display:flex;flex-direction:column;min-width:0;position:relative">';
  // Toolbar
  h+='<div class="toolbar"><div class="toolbar-left">';
  h+='<button class="btn-back" onclick="goHome()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg></button>';
  h+='<button class="btn-gear" onclick="toggleGear()" style="background:'+(S.gearOpen?"#1a3a2a":"#161d2b")+';color:'+(S.gearOpen?"#4CAF50":"#5a6580")+';border-color:'+(S.gearOpen?"#2a5a3a":"#1e2738")+'"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M4 6h2M4 9h2M8 6h4M8 9h4"/></svg>Gear</button>';
  h+='<span class="flow-name">'+esc(S.curName)+'</span></div>';
  h+='<div class="toolbar-right">';
  var modes=[["move","Move"],["addNode","+ Add"],["addConn","Link"],["delete","Del"]];
  for(var mi=0;mi<modes.length;mi++){var mm=modes[mi];h+='<button class="btn-mode'+(S.mode===mm[0]?" active":"")+'" onclick="setMode(\''+mm[0]+'\')">'+mm[1]+'</button>'}
  h+='<div style="width:1px;height:20px;background:#1e2738;margin:0 2px"></div>';
  h+='<button class="btn-action btn-save" onclick="showSave()">Save</button>';
  h+='<button class="btn-action btn-svg" onclick="exportSVG()">SVG</button>';
  h+='<button class="btn-action btn-json" onclick="exportJSON()">JSON</button>';
  h+='</div></div>';
  var hc=S.mode==="delete"?"hint-del":S.mode==="addNode"?"hint-add":S.mode==="addConn"?"hint-conn":"hint-move";
  var hmsg={move:"Drag nodes | Scroll to zoom | Drag background to pan | Double-click to edit",addNode:"Click on the canvas to place a custom node, or use the Gear panel",addConn:S.connSt?"Click the destination node to complete the connection":"Click a source node, then click a destination","delete":"Click a node or connection label to remove it"};
  h+='<div class="hint '+hc+'">'+(hmsg[S.mode]||"")+'</div>';
  h+='<svg id="svg" width="100%" style="flex:1;background:#0f1219"></svg>';
  // Legend as HTML overlay
  h+='<div id="legend-box" class="legend-box" style="display:none"></div>';
  // Sel info
  if(S.sel&&S.mode==="move"){var sn=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.sel){sn=S.nodes[i];break}}if(sn){h+='<div class="sel-info" style="left:'+(S.gearOpen?294:14)+'px"><span class="sel-info-name">'+esc(sn.label.replace(/\n/g," "))+'</span><button class="sel-info-btn" onclick="startEdit(\''+S.sel+'\')">Edit</button></div>'}}
  h+='</div></div>';
  app.innerHTML=h;
  renderSVGOnly();
  renderGear();
  renderLegend();
  attachEvents();
}

function renderLegend(){
  var box=document.getElementById("legend-box");if(!box)return;
  var usedTypes={};for(var i=0;i<S.conns.length;i++){usedTypes[S.conns[i].type]=true}
  var ccKeys=Object.keys(CC);var h="";var count=0;
  for(var i=0;i<ccKeys.length;i++){var k=ccKeys[i],v=CC[k];if(!usedTypes[k])continue;count++;h+='<div class="legend-row"><svg width="18" height="2"><line x1="0" y1="1" x2="18" y2="1" stroke="'+v+'" stroke-width="2.5"/></svg><span class="legend-label">'+k+'</span></div>'}
  if(count>0){box.innerHTML=h;box.style.display="block"}else{box.style.display="none"}
}

function renderGear(){
  var list=document.getElementById("gearlist");if(!list)return;
  var q=S.gearFilter.toLowerCase();var h="";var found=false;
  for(var gi=0;gi<GEAR.length;gi++){var g=GEAR[gi];if(S.gearCat!=="All"&&g.cat!==S.gearCat)continue;var fitems=[];for(var ii=0;ii<g.items.length;ii++){var it=g.items[ii];if(!q||it.model.toLowerCase().indexOf(q)>=0||it.label.toLowerCase().indexOf(q)>=0||(it.id||"").toLowerCase().indexOf(q)>=0){fitems.push({item:it,idx:ii})}}if(fitems.length===0)continue;found=true;
    h+='<div class="gear-sub-title">'+esc(g.cat)+(g.sub?" &mdash; "+esc(g.sub):"")+'</div>';
    for(var fi=0;fi<fitems.length;fi++){var fit=fitems[fi];h+='<div class="gear-item" onclick="addGear('+gi+','+fit.idx+')" style="border-left-color:'+(CAT_COLORS[g.cat]||"#555")+'"><div class="gear-item-model">'+esc(fit.item.model)+'</div><div class="gear-item-meta"><span>'+esc(fit.item.id||"")+'</span><span>&times;'+fit.item.qty+'</span></div></div>'}}
  if(!found)h='<div style="color:#3a4660;font-size:12px;margin-top:24px;text-align:center">No matching equipment</div>';
  list.innerHTML=h;
}

function renderSVGOnly(){
  var svg=document.getElementById("svg");if(!svg)return;
  var ns=S.nodes,cs=S.conns;
  var s='<rect data-bg="1" width="100%" height="100%" fill="#0f1219"/><g transform="translate('+S.panX+','+S.panY+') scale('+S.zoom+')">';
  for(var ci=0;ci<cs.length;ci++){var c=cs[ci];var cf=null,ct=null;for(var j=0;j<ns.length;j++){if(ns[j].id===c.from)cf=ns[j];if(ns[j].id===c.to)ct=ns[j]}if(!cf||!ct)continue;var ep=getEP(ns,c.from,c.to);var mx=(ep.fx+ep.tx)/2,my=(ep.fy+ep.ty)/2;var col=CC[c.type]||CC.Other;s+='<line x1="'+ep.fx+'" y1="'+ep.fy+'" x2="'+ep.tx+'" y2="'+ep.ty+'" stroke="'+col+'" stroke-width="2" opacity="0.6"/><circle cx="'+ep.tx+'" cy="'+ep.ty+'" r="3" fill="'+col+'"/>';if(c.label){var bw=c.label.length*6.4+12;s+='<g transform="translate('+mx+','+my+')" data-conn="'+c.id+'" style="cursor:'+(S.mode==="delete"?"pointer":"default")+'"><rect x="'+(-bw/2)+'" y="-9" width="'+bw+'" height="18" rx="4" fill="'+(S.mode==="delete"?"#2a1018":"#0f1219")+'" opacity="0.9" stroke="'+(S.mode==="delete"?"#6a2535":"transparent")+'"/><text text-anchor="middle" dy="4" fill="'+(S.mode==="delete"?"#ff6b7a":"#5a6580")+'" font-size="9" font-family="monospace" pointer-events="none">'+esc(c.label)+'</text></g>'}}
  if(S.mode==="addConn"&&S.connSt){var csn=null;for(var j=0;j<ns.length;j++){if(ns[j].id===S.connSt){csn=ns[j];break}}if(csn)s+='<line x1="'+(csn.x+csn.w/2)+'" y1="'+(csn.y+csn.h/2)+'" x2="'+S.mX+'" y2="'+S.mY+'" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6 4" opacity="0.7" pointer-events="none"/>'}
  for(var ni=0;ni<ns.length;ni++){var n=ns[ni];var isSel=S.sel===n.id,isCS=S.connSt===n.id,isDel=S.mode==="delete";var stroke=isSel?"#7aafff":isCS?"#4a6fa5":isDel?"#6a2535":"rgba(255,255,255,0.08)";var sw=isSel||isCS?2.5:isDel?2:1;var cursor=isDel?"pointer":S.mode==="addConn"?"pointer":"move";s+='<g data-node="'+n.id+'" transform="translate('+n.x+','+n.y+')" style="cursor:'+cursor+'"><rect width="'+n.w+'" height="'+n.h+'" rx="8" fill="'+n.color+'" stroke="'+stroke+'" stroke-width="'+sw+'"'+(isSel?' filter="url(#glow)"':"")+'/>';var lines=n.label.split("\n");for(var li=0;li<lines.length;li++){var ty=n.h/2+(li-(lines.length-1)/2)*14;s+='<text x="'+(n.w/2)+'" y="'+ty+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="11" font-weight="600" font-family="Segoe UI,system-ui,sans-serif" pointer-events="none">'+esc(lines[li])+'</text>'}s+='</g>'}
  s+='<defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs></g>';
  svg.innerHTML=s;
  renderLegend();
}

function svgPt(cx,cy){var svg=document.getElementById("svg");if(!svg)return{x:cx,y:cy};var r=svg.getBoundingClientRect();return{x:(cx-r.left-S.panX)/S.zoom,y:(cy-r.top-S.panY)/S.zoom}}

function attachEvents(){
  var svg=document.getElementById("svg");if(!svg)return;
  svg.onpointerdown=function(e){var nodeEl=e.target.closest?e.target.closest("[data-node]"):null;var connEl=e.target.closest?e.target.closest("[data-conn]"):null;
    if(connEl&&S.mode==="delete"){e.stopPropagation();var cid=connEl.getAttribute("data-conn");S.conns=S.conns.filter(function(c){return c.id!==cid});renderSVGOnly();return}
    if(nodeEl){e.stopPropagation();var id=nodeEl.getAttribute("data-node");
      if(S.mode==="delete"){S.nodes=S.nodes.filter(function(n){return n.id!==id});S.conns=S.conns.filter(function(c){return c.from!==id&&c.to!==id});S.sel=null;renderSVGOnly();return}
      if(S.mode==="addConn"){if(!S.connSt){S.connSt=id;renderSVGOnly()}else if(S.connSt!==id){S.fd={from:S.connSt,to:id,label:"",type:"SDI"};S.connSt=null;S.modal="conn";renderModal()}return}
      var pt=svgPt(e.clientX,e.clientY);var n=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===id){n=S.nodes[i];break}}if(!n)return;S.drag=id;S.sel=id;S.offX=pt.x-n.x;S.offY=pt.y-n.y;renderSVGOnly();return}
    if(e.target===svg||e.target.getAttribute("data-bg")){S.sel=null;
      if(S.mode==="addNode"){var pt2=svgPt(e.clientX,e.clientY);S.fd={x:pt2.x,y:pt2.y,label:"",color:COLORS[0]};S.modal="addNode";renderModal();return}
      if(S.mode==="addConn"){S.connSt=null;renderSVGOnly();return}
      S.panning=true;S.psX=e.clientX-S.panX;S.psY=e.clientY-S.panY}};
  svg.onpointermove=function(e){var pt=svgPt(e.clientX,e.clientY);S.mX=pt.x;S.mY=pt.y;if(S.panning){S.panX=e.clientX-S.psX;S.panY=e.clientY-S.psY;renderSVGOnly();return}if(S.drag){var n=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.drag){n=S.nodes[i];break}}if(n){n.x=pt.x-S.offX;n.y=pt.y-S.offY;renderSVGOnly()}return}if(S.mode==="addConn"&&S.connSt)renderSVGOnly()};
  svg.onpointerup=function(){S.drag=null;S.panning=false};
  svg.ondblclick=function(e){var ne=e.target.closest?e.target.closest("[data-node]"):null;if(ne&&S.mode==="move")startEdit(ne.getAttribute("data-node"))};
  svg.addEventListener("wheel",function(e){e.preventDefault();S.zoom=Math.min(2,Math.max(0.3,S.zoom-e.deltaY*0.001));renderSVGOnly()},{passive:false});
}

function closeModal(){var old=document.getElementById("modal-ov");if(old)old.parentNode.removeChild(old)}
function renderModal(){
  closeModal();if(!S.modal)return;
  var div=document.createElement("div");div.id="modal-ov";div.className="overlay";
  div.onclick=function(e){if(e.target===div){S.modal=null;closeModal()}};
  var h='<div class="modal" onclick="event.stopPropagation()">';
  if(S.modal==="addNode"){
    h+='<h3>Add Custom Node</h3><label>Label</label><input id="m-label" class="minput" value="'+esc(S.fd.label||"")+'" placeholder="e.g. NEW CAMERA (use \\n for line breaks)">';
    h+='<label>Color</label><div class="color-row">';for(var i=0;i<COLORS.length;i++){h+='<div class="cswatch'+(S.fd.color===COLORS[i]?" sel":"")+'" style="background:'+COLORS[i]+'" onclick="setFDColor(\''+COLORS[i]+'\')"></div>'}
    h+='</div><div class="mactions"><button class="btn-cc" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doAddNode()">Add Node</button></div>';
  }else if(S.modal==="conn"){
    var fn=null,tn=null;for(var i=0;i<S.nodes.length;i++){if(S.nodes[i].id===S.fd.from)fn=S.nodes[i];if(S.nodes[i].id===S.fd.to)tn=S.nodes[i]}
    h+='<h3>New Connection</h3><div style="font-size:12px;color:#5a6580;margin-bottom:14px;padding:8px 12px;background:#111824;border-radius:8px">'+(fn?esc(fn.label.replace(/\n/g," ")):"")+'  &rarr;  '+(tn?esc(tn.label.replace(/\n/g," ")):"")+' </div>';
    h+='<label>Label</label><input id="m-clabel" class="minput" value="'+esc(S.fd.label||"")+'" placeholder="e.g. SDI OUT 5">';
    h+='<label>Type</label><div class="type-row">';var ccKeys=Object.keys(CC);for(var i=0;i<ccKeys.length;i++){var k=ccKeys[i],v=CC[k];var isSel=S.fd.type===k;h+='<button class="tbtn" style="background:'+(isSel?v:"transparent")+';color:'+(isSel?"#fff":v)+';border:1.5px solid '+v+';font-weight:'+(isSel?"600":"400")+'" onclick="setFDType(\''+k+'\')">'+k+'</button>'}
    h+='</div><div class="mactions"><button class="btn-cc" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doAddConn()">Add Connection</button></div>';
  }else if(S.modal==="edit"){
    h+='<h3>Edit Node</h3><label>Label</label><input id="m-elabel" class="minput" value="'+esc(S.fd.label||"")+'">';
    h+='<label>Color</label><div class="color-row">';for(var i=0;i<COLORS.length;i++){h+='<div class="cswatch'+(S.fd.color===COLORS[i]?" sel":"")+'" style="background:'+COLORS[i]+'" onclick="setEditColor(\''+COLORS[i]+'\')"></div>'}
    h+='</div><div class="mactions"><button class="btn-cc" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doSaveEdit()">Save Changes</button></div>';
  }else if(S.modal==="save"){
    h+='<h3>Save Flow</h3><label>Name</label><input id="m-sname" class="minput" value="'+esc(S.fd.name||"")+'">';
    h+='<div class="mactions"><button class="btn-cc" onclick="S.modal=null;closeModal()">Cancel</button><button class="btn-p" onclick="doSave()">Save</button></div>';
  }
  h+='</div>';div.innerHTML=h;document.body.appendChild(div);
  setTimeout(function(){var inp=div.querySelector("input");if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);inp.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();if(S.modal==="addNode")doAddNode();else if(S.modal==="conn")doAddConn();else if(S.modal==="edit")doSaveEdit();else if(S.modal==="save")doSave()}}}},60);
}
render();
</script>
</body>
</html>
